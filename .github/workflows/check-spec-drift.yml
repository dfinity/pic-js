name: check_spec_drift

on:
  schedule:
    # Every Sunday at 09:00 UTC
    - cron: '0 9 * * 0'
  workflow_dispatch:
  workflow_call:

jobs:
  check_spec_drift:
    name: check_spec_drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for spec drift
        run: bash scripts/check-spec-drift.sh
